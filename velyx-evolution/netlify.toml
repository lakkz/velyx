[build]
  publish = "frontend"

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/cadastro"
  to = "/cadastro.html"
  status = 200

[[redirects]]
  from = "/register"
  to = "/cadastro.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
